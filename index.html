<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FS Mods & DLCs | O Blog do Fazendeiro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">FS <span>Mods & DLCs</span></div>
        <nav>
            <button class="filter-btn active" onclick="filtrarMods('todos')">Todos</button>
            <button class="filter-btn" onclick="filtrarMods('FS25')">FS25</button>
            <button class="filter-btn" onclick="filtrarMods('FS22')">FS22</button>
            <button class="filter-btn" onclick="filtrarMods('FS19')">FS19</button>
            <button class="filter-btn" onclick="filtrarMods('FS17')">FS17</button>
            <button class="filter-btn" onclick="filtrarMods('FS15')">FS15</button>
        </nav>
    </header>

    <section class="banner">
        <h1>Modificações e DLCs para Farming Simulator</h1>
        <p>Encontre os melhores tratores, mapas e ferramentas do FS15 ao novíssimo FS25!</p>
    </section>

    <main class="container">
        <div class="mods-grid" id="modsGrid">
            </div>
    </main>

    <div id="imageModal" class="modal" onclick="fecharModal()">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="imgAmpliada">
        <div id="caption"></div>
    </div>

    <footer>
        <p>&copy; 2026 Blog de Farming Simulator. Hospedado no GitHub Pages.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
